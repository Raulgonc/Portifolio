<section class="section" id="contact">
  <div class="container">
    <p class="section-title">{{ translate.t('contact', 'title') }}</p>
    <div class="section-line"></div>

    <div class="contact-grid">
      <div class="contact-left">
        <p class="contact-lead">
          {{ translate.t('contact', 'lead_1') }}<br>
          {{ translate.t('contact', 'lead_2') }}
        </p>

        <div class="contact-links">
          <a href="mailto:raulgoncalves.oliveira21@gmail.com" class="contact-item">
            <span class="item-icon">✉</span>
            <span class="item-label">EMAIL</span>
            <span class="item-value">raulgoncalves.oliveira21@gmail.com</span>
          </a>
          <a href="https://github.com/Raulgonc" target="_blank" class="contact-item">
            <span class="item-icon">⌥</span>
            <span class="item-label">GITHUB</span>
            <span class="item-value">&#64;Raulgonc</span>
          </a>
          <a href="https://www.linkedin.com/in/raul-gonc-dev/" target="_blank" class="contact-item">
            <span class="item-icon">◈</span>
            <span class="item-label">LINKEDIN</span>
            <span class="item-value">raul-gonc-dev</span>
          </a>
        </div>
      </div>

      <form class="contact-form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
        <div class="form-group">
          <label class="form-label">{{ translate.t('contact', 'name_label') }}</label>
          <input
            class="form-input"
            type="text"
            [placeholder]="translate.t('contact', 'name_placeholder')"
            [(ngModel)]="nome"
            name="nome"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label">{{ translate.t('contact', 'email_label') }}</label>
          <input
            class="form-input"
            type="email"
            placeholder="seu@email.com"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label">{{ translate.t('contact', 'msg_label') }}</label>
          <textarea
            class="form-input form-textarea"
            [placeholder]="translate.t('contact', 'msg_placeholder')"
            [(ngModel)]="mensagem"
            name="mensagem"
            required
          ></textarea>
        </div>

        <button
          type="submit"
          class="btn-primary"
          [disabled]="contactForm.invalid"
          [class.sent]="enviado"
        >
          {{ enviado ? translate.t('contact', 'btn_sent') : translate.t('contact', 'btn_send') }}
        </button>
      </form>
    </div>

    <div class="footer-line">
      <span class="footer-text">
        {{ translate.t('contact', 'footer') }}
      </span>
    </div>
  </div>
</section>
