<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="nav-inner">
    <a class="nav-logo" routerLink="/">
      <img src="Logo_semFundo.png" alt="RGO Vision" class="logo-img" />
    </a>

    <ul class="nav-links">
      <li><a routerLink="/clientes" routerLinkActive="active">{{ translate.t('nav', 'clients') }}</a></li>
      <li><a routerLink="/dev" routerLinkActive="active">{{ translate.t('nav', 'dev') }}</a></li>
    </ul>

    <div class="nav-right">
      <button class="lang-toggle" (click)="translate.toggle()" aria-label="Switch language">
        <span [class.active]="translate.lang() === 'pt'">PT</span>
        <span class="lang-sep">|</span>
        <span [class.active]="translate.lang() === 'en'">EN</span>
      </button>

      <a routerLink="/clientes" fragment="orcamento" class="btn-primary btn-nav-cta">
        {{ translate.t('nav', 'cta') }}
      </a>
    </div>
  </div>
</nav>
