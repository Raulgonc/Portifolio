<section class="hero" id="hero">
  <canvas #canvas class="starfield"></canvas>

  <div class="hero-content">
    <div class="hero-tag amber-tag">{{ translate.t('hero', 'tag') }}</div>

    <h1 class="hero-name">
      RAUL<br>
      <span class="hero-name-sub">GONÇALVES</span>
    </h1>

    <p class="hero-role">
      <span class="role-prefix">&gt; </span>{{ translate.t('hero', 'role') }}
      <span class="cursor">_</span>
    </p>

    <p class="hero-quote">
      {{ translate.t('hero', 'quote') }}
    </p>

    <div class="hero-actions">
      <a href="#projects" class="btn-primary">{{ translate.t('hero', 'cta_projects') }}</a>
      <a href="#contact" class="btn-secondary">{{ translate.t('hero', 'cta_contact') }}</a>
    </div>

    <div class="hero-coords">
      <span>LAT 35.6762° N</span>
      <span class="sep">|</span>
      <span>LON 139.6503° E</span>
      <span class="sep">|</span>
      <span>ALT 400km</span>
    </div>
  </div>

  <div class="hero-scroll-hint">
    <span>{{ translate.t('hero', 'scroll') }}</span>
    <div class="scroll-line"></div>
  </div>
</section>
