<section class="section" id="contact">
  <div class="container">
    <p class="section-title">Contact</p>
    <div class="section-line"></div>

    <div class="contact-grid">
      <div class="contact-left">
        <p class="contact-lead">
          Pronto para embarcar num novo projeto?<br>
          Transmita sua mensagem.
        </p>

        <div class="contact-links">
          <a href="mailto:raulgoncalves.oliveira21@gmail.com" class="contact-item">
            <span class="item-icon">✉</span>
            <span class="item-label">EMAIL</span>
            <span class="item-value">raulgoncalves.oliveira21@gmail.com</span>
          </a>
          <a href="https://github.com/Raulgonc" target="_blank" class="contact-item">
            <span class="item-icon">⌥</span>
            <span class="item-label">GITHUB</span>
            <span class="item-value">&#64;Raulgonc</span>
          </a>
          <a href="https://www.linkedin.com/in/raul-gonc-dev/" target="_blank" class="contact-item">
            <span class="item-icon">◈</span>
            <span class="item-label">LINKEDIN</span>
            <span class="item-value">raul-gonc-dev</span>
          </a>
        </div>
      </div>

      <form class="contact-form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
        <div class="form-group">
          <label class="form-label">NOME</label>
          <input
            class="form-input"
            type="text"
            placeholder="Seu nome"
            [(ngModel)]="nome"
            name="nome"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label">EMAIL</label>
          <input
            class="form-input"
            type="email"
            placeholder="seu@email.com"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label">MENSAGEM</label>
          <textarea
            class="form-input form-textarea"
            placeholder="Sua mensagem..."
            [(ngModel)]="mensagem"
            name="mensagem"
            required
          ></textarea>
        </div>

        <button
          type="submit"
          class="btn-primary"
          [disabled]="contactForm.invalid"
          [class.sent]="enviado"
        >
          {{ enviado ? '✓ Transmissão enviada!' : 'Enviar Transmissão' }}
        </button>
      </form>
    </div>

    <div class="footer-line">
      <span class="footer-text">
        &copy; 2025 — Crafted somewhere in the solar system.
      </span>
    </div>
  </div>
</section>
