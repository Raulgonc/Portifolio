<section class="hero" id="hero">

  <ngx-particles
    [id]="particlesId"
    [options]="particlesOptions"
    [particlesInit]="particlesInit"
    (particlesLoaded)="particlesLoaded($event)"
    class="hero-particles">
  </ngx-particles>

  <div class="hero-content">
    <img src="Logo_semFundo.png" alt="RGO Vision" class="hero-logo" />

    <p class="hero-tagline">{{ translate.t('footer', 'tagline') }}</p>

    <div class="hero-actions">
      <a routerLink="/clientes" class="hero-btn hero-btn-primary">
        {{ translate.t('nav', 'clients') }}
      </a>
      <a routerLink="/dev" class="hero-btn hero-btn-secondary">
        {{ translate.t('nav', 'dev') }}
      </a>
    </div>
  </div>

  <a href="#sobre" class="hero-scroll">
    <span class="hero-scroll-label">{{ translate.t('hero', 'scroll') }}</span>
    <div class="hero-scroll-arrow">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 5v14M5 13l7 7 7-7" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </a>

</section>
